spring:
  application:
    name: ehs-business-service

  # 数据源配置
  datasource:
    url: jdbc:postgresql://localhost:5432/ehs_db
    username: ehs_user
    password: ehs_password
    driver-class-name: org.postgresql.Driver

  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # 初始化配置
  sql:
    init:
      mode: never

# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /

# JWT 配置
jwt:
  secret: ehs-jwt-secret-key-2026-production-change-me
  expiration-ms: 86400000  # 24 小时
  issuer: ehs-business-service

# gRPC 配置（Python AI 服务）
grpc:
  python-ai:
    host: localhost
    port: 50051
    enabled: true

# 日志配置
logging:
  level:
    root: INFO
    com.ehs.business: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Actuator 监控端点
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
