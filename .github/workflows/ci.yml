name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: '18'
  PYTHON_VERSION: '3.11'
  JAVA_VERSION: '17'

jobs:
  # ============================================
  # Python AI Service 测试与构建
  # ============================================
  python-test:
    name: Python AI Service - Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python-ai-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('python-ai-service/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run linter (flake8)
        run: |
          pip install flake8
          flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 src/ --count --max-complexity=10 --max-line-length=127 --statistics
        continue-on-error: true

      - name: Run pytest
        run: |
          pip install pytest pytest-cov
          pytest tests/ -v --cov=src --cov-report=xml --cov-report=term-missing
        continue-on-error: true

      - name: Upload coverage to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: python-ai-service/coverage.xml
        if: success()

  python-build:
    name: Python AI Service - Build Docker
    runs-on: ubuntu-latest
    needs: [python-test]
    defaults:
      run:
        working-directory: python-ai-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t ehs-python-service:${{ github.sha }} .

  # ============================================
  # Node.js Admin Console 测试与构建
  # ============================================
  node-test:
    name: Admin Console - Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/admin-console

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            apps/admin-console/node_modules
            node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('apps/admin-console/package-lock.json', 'package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

      - name: Run TypeScript check
        run: npm run typecheck
        continue-on-error: true

      - name: Run tests
        run: npm run test -- --coverage
        continue-on-error: true

      - name: Upload coverage to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: admin-console-coverage
          path: apps/admin-console/coverage/
        if: success()

  node-build:
    name: Admin Console - Build Production
    runs-on: ubuntu-latest
    needs: [node-test]
    defaults:
      run:
        working-directory: apps/admin-console

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: admin-console-build
          path: apps/admin-console/dist/

  # ============================================
  # Java EHS Business Service 测试与构建
  # ============================================
  java-test:
    name: Java EHS Business - Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ehs-business

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('apps/ehs-business/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run Maven tests
        run: |
          mvn --batch-mode --update-snapshots test
        continue-on-error: true

      - name: Run Maven build
        run: |
          mvn --batch-mode --update-snapshots package -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: ehs-business-jar
          path: apps/ehs-business/target/*.jar

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: java-test-results
          path: apps/ehs-business/target/surefire-reports/

  # ============================================
  # E2E Playwright 测试
  # ============================================
  e2e-test:
    name: E2E Playwright Tests
    runs-on: ubuntu-latest
    needs: [python-build, node-build]
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install root dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run E2E tests
        run: npm run test:e2e
        continue-on-error: true

      - name: Upload E2E test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: test-results/
          retention-days: 30

  # ============================================
  # Docker Compose 验证
  # ============================================
  docker-compose-verify:
    name: Docker Compose Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Docker Compose
        run: |
          docker compose config --quiet
        continue-on-error: true

  # ============================================
  # 部署到临时环境 (可选)
  # ============================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [python-test, node-test, java-test, e2e-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy placeholder
        run: |
          echo "=== Deploy to Staging Environment ==="
          echo "This is a placeholder for staging deployment."
          echo "Configure your deployment script here (e.g., kubectl apply, helm upgrade)"
