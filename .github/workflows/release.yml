name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v2.0.0)'
        required: true
        type: string

env:
  NODE_VERSION: '18'
  PYTHON_VERSION: '3.11'
  JAVA_VERSION: '17'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============================================
  # 版本验证
  # ============================================
  validate-version:
    name: Validate Release Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag or input
        id: get_version
        run: |
          if [[ ${{ github.event_name }} == 'push' ]]; then
            VERSION=${{ github.ref_name }}
          else
            VERSION=${{ inputs.version }}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"

  # ============================================
  # Python AI Service 构建与发布
  # ============================================
  release-python:
    name: Release Python AI Service
    runs-on: ubuntu-latest
    needs: [validate-version]
    defaults:
      run:
        working-directory: apps/ehs-ai

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/python-service
          tags: |
            type=raw,value=${{ needs.validate-version.outputs.version }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: apps/ehs-ai
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # Admin Console 构建与发布
  # ============================================
  release-admin-console:
    name: Release Admin Console
    runs-on: ubuntu-latest
    needs: [validate-version]
    defaults:
      run:
        working-directory: apps/admin-console

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Build production bundle
        run: pnpm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/admin-console
          tags: |
            type=raw,value=${{ needs.validate-version.outputs.version }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: apps/admin-console
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # Java EHS Business 构建与发布
  # ============================================
  release-java:
    name: Release Java EHS Business
    runs-on: ubuntu-latest
    needs: [validate-version]
    defaults:
      run:
        working-directory: apps/ehs-business

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Run Maven tests
        run: |
          mvn --batch-mode --update-snapshots test

      - name: Build JAR with Maven
        run: |
          mvn --batch-mode --update-snapshots package -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: ehs-business-${{ needs.validate-version.outputs.version }}.jar
          path: apps/ehs-business/target/*.jar

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/ehs-business
          tags: |
            type=raw,value=${{ needs.validate-version.outputs.version }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: apps/ehs-business
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # Helm Chart 发布
  # ============================================
  release-helm:
    name: Release Helm Chart
    runs-on: ubuntu-latest
    needs: [validate-version, release-python, release-java, release-admin-console]

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.13.0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.6.0
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          charts_dir: infra/k8s/ehs-helm
          charts_repo_url: https://github.com/${{ github.repository }}

  # ============================================
  # 生成 Release Notes
  # ============================================
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate-version, release-python, release-java, release-admin-console, release-helm]
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: get_version
        run: |
          if [[ ${{ github.event_name }} == 'push' ]]; then
            VERSION=${{ github.ref_name }}
          else
            VERSION=${{ inputs.version }}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 ${{ steps.get_version.outputs.version }}^ 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            echo "No previous tag found, this is the first release"
            COMMITS=$(git log ${{ steps.get_version.outputs.version }} --pretty=format:"* %s (%h)")
          else
            echo "Previous tag: $PREVIOUS_TAG"
            COMMITS=$(git log $PREVIOUS_TAG..${{ steps.get_version.outputs.version }} --pretty=format:"* %s (%h)")
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: Release ${{ steps.get_version.outputs.version }}
          body: |
            ## EHS 智能安保决策中台 ${{ steps.get_version.outputs.version }}

            ### 🎉 新特性
            - Python AI Service: ${{ steps.get_version.outputs.version }}
            - Admin Console: ${{ steps.get_version.outputs.version }}
            - Java EHS Business: ${{ steps.get_version.outputs.version }}

            ### 📝 变更日志
            ${{ steps.changelog.outputs.changelog }}

            ### 📦 Docker 镜像
            - `ghcr.io/${{ github.repository }}/python-service:${{ steps.get_version.outputs.version }}`
            - `ghcr.io/${{ github.repository }}/admin-console:${{ steps.get_version.outputs.version }}`
            - `ghcr.io/${{ github.repository }}/ehs-business:${{ steps.get_version.outputs.version }}`

            ### 📋 安装
            ```bash
            # 使用 Helm 安装
            helm repo add ehs https://github.com/${{ github.repository }}/pages
            helm install ehs ehs/ehs-helm --version ${{ steps.get_version.outputs.version }}
            ```
          draft: false
          prerelease: false
          files: |
            apps/ehs-business/target/*.jar
