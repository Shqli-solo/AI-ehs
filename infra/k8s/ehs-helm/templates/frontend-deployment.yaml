apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.frontend.name }}
  labels:
    app.kubernetes.io/name: {{ .Values.frontend.name }}
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: ehs-platform
    {{- include "ehs-helm.labels" . | nindent 4 }}
spec:
  {{- if not .Values.frontend.autoscaling.enabled }}
  replicas: {{ .Values.frontend.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.frontend.name }}
      {{- include "ehs-helm.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.frontend.name }}
        app.kubernetes.io/component: frontend
        app.kubernetes.io/part-of: ehs-platform
        {{- include "ehs-helm.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.frontend.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "ehs-helm.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: {{ .Values.podSecurity.runAsNonRoot }}
        {{- if .Values.podSecurity.seccompProfile }}
        seccompProfile:
          type: {{ .Values.podSecurity.seccompProfile.type }}
        {{- end }}
      {{- with .Values.frontend.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: frontend
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: {{ .Values.podSecurity.allowPrivilegeEscalation }}
            capabilities:
              drop:
                {{- toYaml .Values.podSecurity.capabilities.drop | nindent 16 }}
            {{- if .Values.podSecurity.readOnlyRootFilesystem }}
            readOnlyRootFilesystem: {{ .Values.podSecurity.readOnlyRootFilesystem }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.frontend.service.targetPort }}
              protocol: TCP
          {{- if .Values.frontend.livenessProbe }}
          livenessProbe:
            {{- toYaml .Values.frontend.livenessProbe | nindent 12 }}
          {{- end }}
          {{- if .Values.frontend.readinessProbe }}
          readinessProbe:
            {{- toYaml .Values.frontend.readinessProbe | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: {{ include "ehs-helm.configMapName" . }}
                  key: NODE_ENV
            {{- if .Values.frontend.extraEnv }}
            {{- toYaml .Values.frontend.extraEnv | nindent 12 }}
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "ehs-helm.configMapName" . }}
            {{- if .Values.secrets.enabled }}
            - secretRef:
                name: {{ include "ehs-helm.secretName" . }}
            {{- end }}
          volumeMounts:
            {{- if .Values.frontend.extraVolumeMounts }}
            {{- toYaml .Values.frontend.extraVolumeMounts | nindent 12 }}
            {{- end }}
      {{- with .Values.frontend.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.frontend.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.frontend.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        {{- if .Values.frontend.extraVolumes }}
        {{- toYaml .Values.frontend.extraVolumes | nindent 8 }}
        {{- end }}
