{{- if .Values.secrets.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ehs-helm.secretName" . }}
  labels:
    {{- include "ehs-helm.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.secrets.databasePassword }}
  DATABASE_PASSWORD: {{ .Values.secrets.databasePassword | quote }}
  {{- end }}
  {{- if .Values.secrets.esPassword }}
  ES_PASSWORD: {{ .Values.secrets.esPassword | quote }}
  {{- end }}
  {{- if .Values.secrets.milvusPassword }}
  MILVUS_PASSWORD: {{ .Values.secrets.milvusPassword | quote }}
  {{- end }}
  {{- if .Values.secrets.jwtSecret }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  {{- end }}
  {{- if .Values.secrets.langfusePublicKey }}
  LANGFUSE_PUBLIC_KEY: {{ .Values.secrets.langfusePublicKey | quote }}
  {{- end }}
  {{- if .Values.secrets.langfuseSecretKey }}
  LANGFUSE_SECRET_KEY: {{ .Values.secrets.langfuseSecretKey | quote }}
  {{- end }}
  {{- if .Values.secrets.llmApiKey }}
  LLM_API_KEY: {{ .Values.secrets.llmApiKey | quote }}
  {{- end }}
{{- end }}
