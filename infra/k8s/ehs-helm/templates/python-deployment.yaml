apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.pythonService.name }}
  labels:
    app.kubernetes.io/name: {{ .Values.pythonService.name }}
    app.kubernetes.io/component: python-service
    app.kubernetes.io/part-of: ehs-platform
    {{- include "ehs-helm.labels" . | nindent 4 }}
spec:
  {{- if not .Values.pythonService.autoscaling.enabled }}
  replicas: {{ .Values.pythonService.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.pythonService.name }}
      {{- include "ehs-helm.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.pythonService.name }}
        app.kubernetes.io/component: python-service
        app.kubernetes.io/part-of: ehs-platform
        {{- include "ehs-helm.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.pythonService.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "ehs-helm.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: {{ .Values.podSecurity.runAsNonRoot }}
        {{- if .Values.podSecurity.seccompProfile }}
        seccompProfile:
          type: {{ .Values.podSecurity.seccompProfile.type }}
        {{- end }}
      {{- with .Values.pythonService.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.pythonService.gpu }}
      {{- if .Values.pythonService.gpu.enabled }}
      runtimeClassName: nvidia
      {{- end }}
      {{- end }}
      containers:
        - name: python-service
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.pythonService.image.repository }}:{{ .Values.pythonService.image.tag }}"
          imagePullPolicy: {{ .Values.pythonService.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: {{ .Values.podSecurity.allowPrivilegeEscalation }}
            capabilities:
              drop:
                {{- toYaml .Values.podSecurity.capabilities.drop | nindent 16 }}
            {{- if .Values.podSecurity.readOnlyRootFilesystem }}
            readOnlyRootFilesystem: {{ .Values.podSecurity.readOnlyRootFilesystem }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.pythonService.service.targetPort }}
              protocol: TCP
            {{- if .Values.pythonService.grpc.enabled }}
            - name: grpc
              containerPort: {{ .Values.pythonService.grpc.port }}
              protocol: TCP
            {{- end }}
          {{- if .Values.pythonService.livenessProbe }}
          livenessProbe:
            {{- toYaml .Values.pythonService.livenessProbe | nindent 12 }}
          {{- end }}
          {{- if .Values.pythonService.readinessProbe }}
          readinessProbe:
            {{- toYaml .Values.pythonService.readinessProbe | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.pythonService.resources | nindent 12 }}
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: PYTHON_ENV
              valueFrom:
                configMapKeyRef:
                  name: {{ include "ehs-helm.configMapName" . }}
                  key: PYTHON_ENV
            {{- if .Values.pythonService.extraEnv }}
            {{- toYaml .Values.pythonService.extraEnv | nindent 12 }}
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "ehs-helm.configMapName" . }}
            {{- if .Values.secrets.enabled }}
            - secretRef:
                name: {{ include "ehs-helm.secretName" . }}
            {{- end }}
          volumeMounts:
            {{- if .Values.pythonService.extraVolumeMounts }}
            {{- toYaml .Values.pythonService.extraVolumeMounts | nindent 12 }}
            {{- end }}
      {{- with .Values.pythonService.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.pythonService.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.pythonService.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        {{- if .Values.pythonService.extraVolumes }}
        {{- toYaml .Values.pythonService.extraVolumes | nindent 8 }}
        {{- end }}
