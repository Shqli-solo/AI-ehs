# EHS 智能安保决策中台 - 全栈 Docker Compose
#
# 架构: PostgreSQL + pgvector 统一数据存储（参考 Dify）
# 启动方式:
#   docker compose up -d              # 启动所有服务
#   docker compose up -d ollama       # 仅启动基础设施
#   docker compose logs -f ehs-ai     # 查看日志
#   docker compose down               # 停止所有服务

services:
  # ============================================
  # 基础设施层
  # ============================================

  # PostgreSQL (业务数据库 + pgvector 向量存储)
  # 参考: Dify 使用 pgvector/pgvector:pg16 统一存储
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ehs-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-ehs}
      - POSTGRES_USER=${POSTGRES_USER:-ehs}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-ehs123}
      - POSTGRES_INITDB_ARGS=--encoding=UTF8
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ehs}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Ollama + LLM (风险评级用 Qwen3-7B)
  ollama:
    image: ollama/ollama:latest
    container_name: ehs-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # MinIO (多模态数据存储)
  minio:
    image: minio/minio:latest
    container_name: ehs-minio
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Neo4j (知识图谱)
  neo4j:
    image: neo4j:5.14
    container_name: ehs-neo4j
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-ehs123456}
      - NEO4J_PLUGINS=["apoc"]
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "ehs123456", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ============================================
  # 应用服务层
  # ============================================

  # Python AI 服务 (FastAPI + gRPC)
  ehs-ai:
    build:
      context: ./apps/ehs-ai
      dockerfile: Dockerfile
    container_name: ehs-ai-service
    ports:
      - "8000:8000"
      - "50051:50051"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-ehs}:${POSTGRES_PASSWORD:-ehs123}@postgres:5432/${POSTGRES_DB:-ehs}
      - DB_SCHEMA=ehs_ai
      - LLM_ENDPOINT=http://ollama:11434/v1/chat/completions
      - LLM_MODEL=qwen3:7b
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CORS_ORIGINS=http://localhost:3000,http://localhost:3001,http://localhost:5173
      - JWT_SECRET=${JWT_SECRET:-ehs-jwt-secret-change-in-production}
      - AUTH_ENABLED=false
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Java 业务服务 (Spring Boot + COLA)
  ehs-business:
    build:
      context: ./apps/ehs-business
      dockerfile: Dockerfile
    container_name: ehs-business-service
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ehs}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-ehs}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-ehs123}
      - SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA=ehs_business
      - GRPC_AI_SERVICE_HOST=ehs-ai
      - GRPC_AI_SERVICE_PORT=50051
    depends_on:
      ehs-ai:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s

  # 前端管理控制台 (Next.js)
  admin-console:
    build:
      context: ./apps/admin-console
      dockerfile: Dockerfile
    container_name: ehs-admin-console
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://ehs-ai:8000
    depends_on:
      - ehs-ai
    restart: unless-stopped

  # 数据导入服务 (一次性运行)
  data-seed:
    build:
      context: ./apps/ehs-ai
      dockerfile: Dockerfile
    container_name: ehs-data-seed
    profiles:
      - seed
    command: python scripts/seed_data.py
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-ehs}:${POSTGRES_PASSWORD:-ehs123}@postgres:5432/${POSTGRES_DB:-ehs}
      - DB_SCHEMA=ehs_ai
      - LLM_ENDPOINT=http://ollama:11434/v1/chat/completions
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - NEO4J_URL=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=ehs123456
    depends_on:
      ollama:
        condition: service_healthy
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy

  # ============================================
  # 监控层
  # ============================================

  prometheus:
    image: prom/prometheus:latest
    container_name: ehs-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    restart: unless-stopped
    depends_on:
      - ehs-ai
      - ehs-business

  grafana:
    image: grafana/grafana:latest
    container_name: ehs-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=grafana-clock-panel
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    depends_on:
      - prometheus

volumes:
  ollama_data:
  minio_data:
  postgres_data:
  neo4j_data:
  prometheus_data:
  grafana_data:
